# Quality gates run on every commit. Uses the project's pinned tools via uv so
# local and CI runs match exactly. Install with: uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx --no-install eslint .'
        language: system
        files: ^frontend/.*\.(ts|tsx|js)$
        pass_filenames: false
      - id: tsc
        name: tsc (frontend)
        entry: bash -c 'cd frontend && npx --no-install tsc -b --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]
        exclude: '\.webp$'
